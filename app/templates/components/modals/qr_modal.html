<!-- QR Code Modal -->
<div class="modal fade" id="qrCodeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Leave Pass QR Code</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div id="qr-code-container">
                    <img id="qr-code-image" src="" alt="QR Code" style="max-width: 300px;">
                </div>
                <div class="mt-3">
                    <p class="mb-2"><strong>Leave ID:</strong> <span id="qr-leave-id"></span></p>
                    <p class="mb-2"><strong>Student:</strong> <span id="qr-student-name"></span></p>
                    <p class="mb-2"><strong>Valid From:</strong> <span id="qr-valid-from"></span></p>
                    <p class="mb-2"><strong>Valid To:</strong> <span id="qr-valid-to"></span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" onclick="downloadQR()">
                    <i class="fas fa-download"></i> Download
                </button>
                <button type="button" class="btn btn-primary" onclick="printQR()">
                    <i class="fas fa-print"></i> Print
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function downloadQR() {
    const qrImage = document.getElementById('qr-code-image').src;
    const link = document.createElement('a');
    link.href = qrImage;
    link.download = 'leave-pass-qr.png';
    link.click();
}

function printQR() {
    const qrCode = document.getElementById('qr-code-image').src;
    const leaveId = document.getElementById('qr-leave-id').textContent;
    const studentName = document.getElementById('qr-student-name').textContent;
    const validFrom = document.getElementById('qr-valid-from').textContent;
    const validTo = document.getElementById('qr-valid-to').textContent;
    
    const printWindow = window.open('', '', 'height=600,width=600');
    printWindow.document.write('<html><head><title>Leave Pass</title>');
    printWindow.document.write('<style>body { text-align: center; font-family: Arial; }</style>');
    printWindow.document.write('</head><body>');
    printWindow.document.write('<h2>Hostel Leave Pass</h2>');
    printWindow.document.write('<img src="' + qrCode + '" style="max-width: 300px; margin: 20px auto;">');
    printWindow.document.write('<p><strong>Leave ID:</strong> ' + leaveId + '</p>');
    printWindow.document.write('<p><strong>Student:</strong> ' + studentName + '</p>');
    printWindow.document.write('<p><strong>Valid From:</strong> ' + validFrom + '</p>');
    printWindow.document.write('<p><strong>Valid To:</strong> ' + validTo + '</p>');
    printWindow.document.write('<hr>');
    printWindow.document.write('<p><small>Show this QR code at the gate for verification</small></p>');
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.print();
}
</script>
